services:
  frontend:
    container_name: stockmanager-frontend
    build:
      context: ./frontend

    command: pnpm dev --host

    environment:
      VITE_API_URL: http://localhost:3000/api

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

  backend:
    container_name: stockmanager-backend

    build:
      context: ./backend

    command: pnpm dev

    ports:
      - "3000:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env
    